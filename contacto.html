<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | DM Marketing - Empecemos Ahora</title>
    <meta name="description"
        content="Toma acción directa. Te respondemos en menos de 24 horas para trazar tu plan de ventas.">

    <!-- Style -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" type="image/png" href="img/logo.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="img/logo.png" alt="DM Marketing Logo" style="height: 120px; vertical-align: middle;">
            </a>
            <nav class="nav">
                <ul class="nav-links">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="servicios.html">Servicios</a></li>
                    <li><a href="precios.html">Precios</a></li>
                    <li><a href="contacto.html" class="active">Contacto</a></li>
                </ul>
                <button class="mobile-menu-btn" aria-label="Abrir menú">
                    <span></span><span></span><span></span>
                </button>
            </nav>
        </div>
    </header>

    <!-- Page Content -->
    <main
        style="min-height: 80vh; display: flex; align-items: center; justify-content: center; background: #fafafa;">
        <div class="container">
            <div style="max-width: 600px; margin: 0 auto; text-align: center;">
                <h1 style="font-size: 3rem; margin-bottom: 10px;">Empezamos</h1>
                <p style="font-size: 1.2rem; color: #666; margin-bottom: 40px;">Te respondo en menos de 24hs. Sin
                    distracciones.</p>

                <div class="contact-form-container"
                    style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: left;">
                    <form id="contactForm"
                        action="https://script.google.com/macros/s/AKfycbwyoFBT6R4us6Q2D4I8PqG-y0-UWpeiyWAkSDGw9aTsKMl-ValSMHvvPqcwM2XTxW9c/exec"
                        method="POST">
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label for="nombre"
                                style="display: block; margin-bottom: 8px; font-weight: 700;">Nombre</label>
                            <input type="text" id="nombre" name="nombre" required placeholder="Cómo te llamas"
                                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                        </div>
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label for="telefono" style="display: block; margin-bottom: 8px; font-weight: 700;">WhatsApp
                                / Teléfono</label>
                            <input type="tel" id="telefono" name="telefono" required placeholder="Tu número de contacto"
                                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                        </div>
                        <div class="form-group" style="margin-bottom: 30px;">
                            <label for="mensaje" style="display: block; margin-bottom: 8px; font-weight: 700;">Mensaje
                                (Opcional)</label>
                            <textarea id="mensaje" name="mensaje" rows="4"
                                placeholder="Cuéntame brevemente qué necesitas para poder ayudarte mejor."
                                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary submit-btn"
                            style="width: 100%; padding: 15px; font-size: 1.1rem;">Enviar mensaje directo</button>
                        <p id="form-message"
                            style="display:none; margin-top: 15px; font-weight: bold; text-align: center;"></p>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Simple Footer -->
    <footer class="footer" style="padding: 40px 0;">
        <div class="container" style="text-align: center;">
            <p style="color: #999;">&copy; 2026 DM Marketing. Montevideo, Uruguay.</p>
        </div>
    </footer>

    <!-- Floating WhatsApp Widget -->
    <div class="whatsapp-widget" id="waWidget">
        <div class="whatsapp-chat-box">
            <div class="wa-header">
                <div class="wa-avatar"><img src="img/logo.png" alt="DM"></div>
                <div class="wa-info">
                    <strong>DM Marketing</strong>
                    <span>En línea</span>
                </div>
            </div>
            <div class="wa-body">
                <div class="wa-message">
                    <p>¡Hola! 👋<br>¿Te ayudamos a estructurar tu sistema de ventas?</p>
                    <span class="wa-time">Ahora</span>
                </div>
            </div>
            <div class="wa-footer">
                <input type="text" id="waMessageInput" placeholder="Escribe un mensaje..." class="wa-input"
                    autocomplete="off">
                <button aria-label="Enviar" class="wa-send-btn" id="waSendBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </div>
        <button class="wa-float-btn" id="waToggle" aria-label="Abrir chat de WhatsApp">
            <svg viewBox="0 0 32 32" width="35" height="35" fill="white">
                <path
                    d="M16 1.422c-8.026 0-14.531 6.505-14.531 14.531 0 2.76.771 5.354 2.125 7.552L1.5 31.422l8.115-2.073c2.094 1.25 4.542 1.969 7.156 1.969 8.026 0 14.531-6.505 14.531-14.531S23.797 1.422 16 1.422zm7.646 20.375c-.328.922-1.906 1.771-2.651 1.849-.703.078-1.547.167-4.526-1.078-3.599-1.51-5.911-5.182-6.089-5.417-.182-.24-1.458-1.958-1.458-3.734 0-1.781.927-2.656 1.26-3.031.328-.365.719-.458.958-.458s.479-.01.688-.01c.208 0 .49.036.755.703.281.714.958 2.349 1.042 2.516.083.167.141.365.042.563-.104.208-.161.328-.318.521-.161.188-.328.375-.469.516-.161.161-.328.344-.141.667.188.313.823 1.354 1.771 2.198 1.224 1.083 2.229 1.417 2.547 1.563.318.151.521.125.714-.104.22-.26.896-1.042 1.135-1.406.24-.365.469-.302.771-.188.318.115 1.958.922 2.292 1.089.333.167.552.25.635.39.083.141.083.823-.239 1.745z" />
            </svg>
        </button>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
